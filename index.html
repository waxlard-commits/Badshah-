<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GG Color</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<div class="login-page">

    <!-- Background -->

    <div class="bg1"></div>
    <div class="bg2"></div>

    <!-- Login Card -->

    <div class="login-card">

        <!-- Logo -->

        <div class="logo-box">

            <img src="assets/logo.png"
                 alt="Logo">

            <h1>GG COLOR</h1>

            <p>
                India's Professional Color Trading Platform
            </p>

        </div>

        <!-- Tabs -->

        <div class="tabs">

            <button
                id="loginTab"
                class="active">

                Login

            </button>

            <button
                id="registerTab">

                Register

            </button>

        </div>

        <!-- LOGIN FORM -->

        <form
            id="loginForm">

            <div class="input-box">

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="input-box">

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required>

            </div>

            <button
                class="main-btn"
                type="submit">

                LOGIN

            </button>

            <div class="forgot">

                <a href="#">

                    Forgot Password?

                </a>

            </div>
            
                    </form>

        <!-- REGISTER FORM -->

        <form
            id="registerForm"
            style="display:none;">

            <div class="input-box">

                <input
                    type="text"
                    id="registerName"
                    placeholder="Full Name"
                    required>

            </div>

            <div class="input-box">

                <input
                    type="email"
                    id="registerEmail"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="input-box">

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Create Password"
                    required>

            </div>

            <div class="input-box">

                <input
                    type="text"
                    id="inviteCode"
                    placeholder="Invitation Code">

            </div>

            <label class="terms">

                <input
                    type="checkbox"
                    required>

                I agree to the
                Terms & Conditions

            </label>

            <button
                type="submit"
                class="main-btn">

                CREATE ACCOUNT

            </button>

        </form>

        <div class="bottom-text">

            Already have an account?

            <span id="goLogin">

                Login

            </span>

        </div>

    </div>

</div>
        <div class="footer-text">

            <p>
                © 2026 GG COLOR
            </p>

            <small>
                Safe • Fast • Secure
            </small>

        </div>

    </div>

</div>

<!-- JavaScript -->

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
